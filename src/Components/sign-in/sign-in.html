<div class="auth-page">
    <section class="auth-card">
        <a class="back-home" routerLink="/home">Back to Home</a>
        <p class="auth-chip">Account Access</p>
        <h1>Welcome back</h1>
        <p class="auth-subtitle">Sign in to continue to your account.</p>

        <form [formGroup]="signinForm" (ngSubmit)="onSubmit()" class="auth-form">
            <label class="field" for="username">
                <span>Username or Email</span>
                <input type="text" id="username" formControlName="username" autocomplete="username" required>
            </label>

            <label class="field" for="password">
                <span>Password</span>
                <input type="password" id="password" formControlName="password" autocomplete="current-password"
                    required>
            </label>

            <button type="submit" class="submit-btn" [disabled]="signinForm.invalid">Sign In</button>
        </form>

        <p class="auth-switch">
            Don't have an account? <a routerLink="/signup">Create one</a>
        </p>
    </section>
</div>
